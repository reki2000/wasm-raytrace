# Deploy the wasm-raytrace static demo to Cloudflare Pages
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang and lld
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Build demo
        run: ./build.sh

      - name: Prepare _site
        run: |
          mkdir -p _site
          cp dino-herd.html _site/index.html
          cp dino-herd.html _site/dino-herd.html
          cp glb.js _site/glb.js
          cp -r models _site/models

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=wasm-raytrace --branch=main
