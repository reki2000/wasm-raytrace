<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>DINO // RT — wasm SIMD128 ray-marched dinosaur</title>
<style>
  :root{
    --bg:#07090d; --ink:#cfd6cf; --dim:#5a6358; --acc:#b6f04e; --line:#1a2017;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body{
    font-family:ui-monospace,'Cascadia Mono','Source Code Pro',Menlo,Consolas,monospace;
    color:var(--ink);
  }
  #stage{position:fixed;inset:0;width:100%;height:100%;cursor:grab;touch-action:none;display:block;
    image-rendering:pixelated;image-rendering:crisp-edges}
  #stage.drag{cursor:grabbing}
  .vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%,transparent 55%,rgba(0,0,0,.42) 100%)}
  header{position:fixed;top:18px;left:22px;pointer-events:none;mix-blend-mode:screen}
  h1{font-size:15px;font-weight:600;letter-spacing:.22em;color:var(--ink)}
  h1 b{color:var(--acc);font-weight:600}
  .sub{margin-top:5px;font-size:10px;letter-spacing:.14em;color:var(--dim)}
  #hud{position:fixed;right:20px;bottom:16px;text-align:right;font-size:11px;
    line-height:1.75;letter-spacing:.06em;color:var(--dim);pointer-events:none}
  #hud .fps{font-size:22px;color:var(--ink);letter-spacing:.04em}
  #hud .fps i{font-style:normal;color:var(--acc)}
  .badge{display:inline-block;margin-top:6px;padding:2px 8px;border:1px solid var(--line);
    border-radius:2px;font-size:9px;letter-spacing:.18em;color:var(--acc);background:rgba(182,240,78,.05)}
  #hint{position:fixed;left:22px;bottom:18px;font-size:10px;letter-spacing:.12em;
    color:var(--dim);pointer-events:none;transition:opacity 1.2s}
  #err{position:fixed;inset:0;display:none;place-items:center;background:var(--bg);
    color:var(--ink);font-size:13px;line-height:2;text-align:center;padding:24px}

  /* ---- material panel ---- */
  #panel{position:fixed;left:18px;top:84px;width:236px;z-index:5;
    background:rgba(7,9,13,.84);border:1px solid var(--line);border-radius:4px;
    backdrop-filter:blur(6px);max-height:calc(100% - 118px);overflow-y:auto;
    scrollbar-width:thin}
  #phead{display:flex;align-items:center;justify-content:space-between;
    padding:8px 12px;cursor:pointer;user-select:none}
  #phead span{font-size:10px;letter-spacing:.22em;color:var(--acc)}
  #phead b{font-size:11px;color:var(--dim);font-weight:400}
  #panel.min #pbody{display:none}
  #pbody{padding:0 12px 10px}
  .dcard{border-top:1px solid var(--line);padding:8px 0 10px}
  .dname{font-size:10px;letter-spacing:.14em;margin-bottom:7px;
    display:flex;align-items:center;gap:7px;color:var(--ink)}
  .chip{width:8px;height:8px;border-radius:2px;flex:none}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:9px}
  .modes button{font:inherit;font-size:9px;letter-spacing:.06em;padding:4px 0;
    background:transparent;border:1px solid var(--line);color:var(--dim);
    border-radius:2px;cursor:pointer}
  .modes button.on{color:var(--acc);border-color:rgba(182,240,78,.55);
    background:rgba(182,240,78,.08)}
  .sliders{display:flex;gap:6px;min-height:128px;align-items:flex-end}
  .sl{display:none;flex-direction:column;align-items:center;gap:3px;flex:1}
  .sl.show{display:flex}
  .sl input[type=range]{
    -webkit-appearance:slider-vertical;
    writing-mode:vertical-lr;direction:rtl;
    width:20px;height:86px;accent-color:var(--acc);cursor:pointer;margin:0}
  .sl .val{font-size:9px;color:var(--ink);letter-spacing:.04em}
  .sl .lab{font-size:9px;color:var(--dim);letter-spacing:.06em;white-space:nowrap}
  @media (max-width:640px){
    #panel{left:10px;top:72px;width:212px}
  }

  /* ---- scene / model / action ---- */
  #scenehead{padding:2px 0 9px}
  .slabel{font-size:9px;letter-spacing:.18em;color:var(--dim);margin:7px 0 5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .pick{font:inherit;font-size:9px;letter-spacing:.05em;padding:5px 2px;
    background:transparent;border:1px solid var(--line);color:var(--dim);
    border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pick.on{color:var(--acc);border-color:rgba(182,240,78,.55);background:rgba(182,240,78,.08)}
  .pick:disabled{opacity:.4;cursor:default}
  #actionwrap{border-top:1px solid var(--line);padding-top:8px;margin-top:2px}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="vig"></div>
<header>
  <h1>DINO <b>//</b> RT</h1>
  <div class="sub">3 SPECIES · RAY-MARCHED SDF · REFLECTIONS · NO GPU</div>
</header>
<div id="hud">
  <div class="fps"><i id="fps">--</i> fps</div>
  <div><span id="res">--</span> · <span id="ms">--</span> ms/frame</div>
  <div class="badge">WASM32 + SIMD128 × 4-RAY PACKETS</div>
</div>
<div id="hint">drag: orbit &nbsp;·&nbsp; wheel / pinch: zoom &nbsp;·&nbsp; panel: surface materials</div>
<div id="panel">
  <div id="phead"><span>SCENE // DINO</span><b id="pfold">−</b></div>
  <div id="pbody">
    <div id="scenehead">
      <div class="slabel">MODEL</div>
      <div class="grid2" id="scenesel"></div>
      <div id="actionwrap" style="display:none">
        <div class="slabel">ACTION</div>
        <div class="grid3" id="actionsel"></div>
      </div>
    </div>
    <div id="matwrap"></div>
  </div>
</div>
<div id="err"><div>このデモには WebAssembly SIMD128 が必要です。<br>
Chrome 91+ / Firefox 89+ / Safari 16.4+ で開いてください。</div></div>

<script src="glb.js"></script>
<script>
(async () => {
const B64 = "__WASM_B64__";

// ---- instantiate (SIMD required) ----
const bin = Uint8Array.from(atob(B64), c => c.charCodeAt(0));
let e;
try {
  ({ instance: { exports: e } } = await WebAssembly.instantiate(bin));
} catch (_) {
  document.getElementById('err').style.display = 'grid';
  return;
}
const fbp = e.fb();

// ---- per-dino material panel ----
// e.mat(i, mode, refl, tran, ior, tex, gloss)  mode: 0 plain 1 texture 2 metal 3 acrylic
const DINOS = [
  { name:'THEROPOD',    color:'#4a8a3c' },
  { name:'STEGOSAURUS', color:'#96551f' },
  { name:'TRICERATOPS', color:'#70755f' },
];
const MODE_LABELS = ['ノーマル','テクスチャ','金属反射','アクリル'];
const PARAMS = {
  tex:  { label:'模様',   min:0,   max:1, step:0.01, def:1.00 },
  refl: { label:'反射率', min:0,   max:1, step:0.01, def:0.50 },
  gloss:{ label:'光沢',   min:0,   max:1, step:0.01, def:0.50 },
  tran: { label:'透過率', min:0,   max:1, step:0.01, def:0.65 },
  ior:  { label:'屈折率', min:1.0, max:2.0, step:0.01, def:1.49 },
};
const MODE_PARAMS = [               // sliders shown per mode
  ['refl','gloss'],                 // ノーマル
  ['tex','refl','gloss'],           // テクスチャ
  ['refl','gloss'],                 // 金属反射
  ['tran','ior','refl'],            // アクリル
];
const mstate = DINOS.map(() => {
  const s = { mode:1 };
  for (const k in PARAMS) s[k] = PARAMS[k].def;
  return s;
});
function pushMat(i){
  const s = mstate[i];
  const tex = s.mode === 1 ? s.tex : 0;   // pattern only in texture mode
  e.mat(i, s.mode, s.refl, s.tran, s.ior, tex, s.gloss);
}
const cards = [];
const $pb = document.getElementById('matwrap');
DINOS.forEach((d, i) => {
  const card = document.createElement('div'); card.className = 'dcard';
  const nm = document.createElement('div'); nm.className = 'dname';
  const ch = document.createElement('span'); ch.className = 'chip';
  ch.style.background = d.color;
  nm.append(ch, d.name);
  const modes = document.createElement('div'); modes.className = 'modes';
  MODE_LABELS.forEach((label, mv) => {
    const b = document.createElement('button');
    b.type = 'button'; b.textContent = label;
    b.onclick = () => {
      mstate[i].mode = mv;
      [...modes.children].forEach((x, j) => x.classList.toggle('on', j === mv));
      showSliders(i); pushMat(i);
    };
    modes.appendChild(b);
  });
  const sliders = document.createElement('div'); sliders.className = 'sliders';
  for (const key in PARAMS){
    const p = PARAMS[key];
    const w = document.createElement('div'); w.className = 'sl'; w.dataset.k = key;
    const r = document.createElement('input');
    r.type = 'range'; r.min = p.min; r.max = p.max; r.step = p.step; r.value = p.def;
    r.setAttribute('orient', 'vertical');           // firefox
    const val = document.createElement('div'); val.className = 'val';
    val.textContent = p.def.toFixed(2);
    const lab = document.createElement('div'); lab.className = 'lab';
    lab.textContent = p.label;
    r.addEventListener('input', () => {
      mstate[i][key] = +r.value;
      val.textContent = (+r.value).toFixed(2);
      pushMat(i);
    });
    w.append(r, val, lab);
    sliders.appendChild(w);
  }
  card.append(nm, modes, sliders);
  $pb.appendChild(card);
  cards.push({ modes, sliders });
});
function showSliders(i){
  const show = MODE_PARAMS[mstate[i].mode];
  for (const w of cards[i].sliders.children)
    w.classList.toggle('show', show.includes(w.dataset.k));
}
DINOS.forEach((_, i) => {
  cards[i].modes.children[mstate[i].mode].classList.add('on');
  showSliders(i); pushMat(i);
});
const $panel = document.getElementById('panel');
const $fold = document.getElementById('pfold');
document.getElementById('phead').onclick = () => {
  $panel.classList.toggle('min');
  $fold.textContent = $panel.classList.contains('min') ? '+' : '−';
};
if (innerWidth < 640) { $panel.classList.add('min'); $fold.textContent = '+'; }

// ---- scene: SDF herd vs Quaternius glTF models ----
const MESH_MODELS = ['T-Rex','Velociraptor','Triceratops','Stegosaurus','Parasaurolophus','Apatosaurus'];
const ACTIONS = ['Idle','Walk','Run','Attack','Jump','Death'];
let sceneMode = 'sdf';     // 'sdf' | 'mesh'
let meshModel = null;      // parsed GLB.buildModel result
let meshAnim = 0;
let boneView = null;       // Float32Array over e.meshBone()
let loadingName = null;
const modelCache = {};

const $scenesel = document.getElementById('scenesel');
const $actionwrap = document.getElementById('actionwrap');
const $actionsel = document.getElementById('actionsel');
const $matwrap = document.getElementById('matwrap');

function mkPick(parent, label){
  const b = document.createElement('button');
  b.type='button'; b.className='pick'; b.textContent=label;
  parent.appendChild(b); return b;
}
const sceneBtns = [];
const sdfBtn = mkPick($scenesel, 'SDF HERD');
sdfBtn.onclick = () => selectScene('sdf', null);
sceneBtns.push({el:sdfBtn, key:'sdf'});
MESH_MODELS.forEach(name => {
  const b = mkPick($scenesel, name.toUpperCase());
  b.onclick = () => selectScene('mesh', name);
  sceneBtns.push({el:b, key:name});
});
const actionBtns = [];
ACTIONS.forEach(a => {
  const b = mkPick($actionsel, a.toUpperCase());
  b.onclick = () => selectAction(a);
  actionBtns.push({el:b, name:a});
});
actionBtns[0].el.classList.add('on');   // default: Idle

function highlightScene(key){ sceneBtns.forEach(s => s.el.classList.toggle('on', s.key===key)); }
function actionNameOf(model, ai){
  const nm = (model.animNames[ai]||'').split('|').pop();
  const p = nm.split('_'); return p[p.length-1];
}
function highlightAction(){
  const cur = meshModel ? actionNameOf(meshModel, meshAnim) : null;
  actionBtns.forEach(b => b.el.classList.toggle('on', b.name===cur));
}
function animIndexFor(model, action){
  const re = new RegExp('_'+action+'$','i');
  let i = model.anims.findIndex(a => re.test(a.name));
  if (i<0) i = model.anims.findIndex(a => new RegExp(action,'i').test(a.name));
  return i<0 ? 0 : i;
}
function uploadModel(m){
  new Float32Array(e.memory.buffer, e.meshPos(),    m.nverts*3).set(m.pos);
  new Int32Array  (e.memory.buffer, e.meshJoint(),  m.nverts*4).set(m.jnt);
  new Float32Array(e.memory.buffer, e.meshWeight(), m.nverts*4).set(m.wgt);
  new Int32Array  (e.memory.buffer, e.meshIndex(),  m.ntris*3).set(m.idx);
  new Float32Array(e.memory.buffer, e.meshColor(),  m.ntris*3).set(m.col);
  e.meshSetCounts(m.nverts, m.ntris, m.nj);
  boneView = new Float32Array(e.memory.buffer, e.meshBone(), m.nj*12);
}
async function loadModel(name){
  if (modelCache[name]) return modelCache[name];
  const buf = await (await fetch('models/'+name+'.glb')).arrayBuffer();
  const m = GLB.buildModel(GLB.parseGLB(buf));
  modelCache[name] = m; return m;
}
async function selectScene(mode, name){
  if (mode==='sdf'){
    sceneMode='sdf'; meshModel=null; highlightScene('sdf');
    $actionwrap.style.display='none'; $matwrap.style.display=''; return;
  }
  highlightScene(name);
  $matwrap.style.display='none'; $actionwrap.style.display='';
  loadingName = name;
  try {
    const m = await loadModel(name);
    if (loadingName!==name) return;        // superseded by a later click
    uploadModel(m); meshModel = m; sceneMode='mesh';
    const cur = actionBtns.find(b=>b.el.classList.contains('on'));
    meshAnim = animIndexFor(m, cur ? cur.name : 'Idle');
    highlightAction();
  } catch(err){ console.error('model load failed:', name, err); }
}
function selectAction(a){
  if (!meshModel){ actionBtns.forEach(b=>b.el.classList.toggle('on', b.name===a)); return; }
  meshAnim = animIndexFor(meshModel, a); highlightAction();
}
highlightScene('sdf');

// ---- adaptive resolution ----
const LV = [[320,180],[480,270],[640,360],[800,450],[960,540]];
let lvl = 1, ema = 10, lastSwitch = 0;
const imgs = LV.map(([w,h]) =>
  new ImageData(new Uint8ClampedArray(e.memory.buffer, fbp, w*h*4), w, h));
const off = document.createElement('canvas');
const octx = off.getContext('2d');

// ---- display canvas ----
const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
function fit(){
  const dpr = Math.min(devicePixelRatio || 1, 2);
  cv.width  = Math.round(innerWidth  * dpr);
  cv.height = Math.round(innerHeight * dpr);
}
addEventListener('resize', fit); fit();

// ---- camera / input ----
let az = 0.95, el = 0.27, dist = 5.6;
let lastTouch = -4000, dragging = false, px = 0, py = 0, pinch0 = 0, dist0 = 0;
const touched = () => { lastTouch = performance.now();
  document.getElementById('hint').style.opacity = 0; };

cv.addEventListener('pointerdown', ev => {
  dragging = true; px = ev.clientX; py = ev.clientY;
  cv.classList.add('drag'); cv.setPointerCapture(ev.pointerId); touched();
});
addEventListener('pointerup', () => { dragging = false; cv.classList.remove('drag'); });
cv.addEventListener('pointermove', ev => {
  if (!dragging) return;
  az -= (ev.clientX - px) * 0.005;
  el  = Math.min(1.25, Math.max(0.03, el + (ev.clientY - py) * 0.004));
  px = ev.clientX; py = ev.clientY; touched();
});
cv.addEventListener('wheel', ev => {
  ev.preventDefault();
  dist = Math.min(12, Math.max(2.8, dist * Math.exp(ev.deltaY * 0.001))); touched();
}, { passive:false });
cv.addEventListener('touchstart', ev => {
  if (ev.touches.length === 2) {
    pinch0 = Math.hypot(ev.touches[0].clientX - ev.touches[1].clientX,
                        ev.touches[0].clientY - ev.touches[1].clientY);
    dist0 = dist;
  }
}, { passive:true });
cv.addEventListener('touchmove', ev => {
  if (ev.touches.length === 2 && pinch0 > 0) {
    const d = Math.hypot(ev.touches[0].clientX - ev.touches[1].clientX,
                         ev.touches[0].clientY - ev.touches[1].clientY);
    dist = Math.min(12, Math.max(2.8, dist0 * pinch0 / d)); touched();
  }
}, { passive:true });

// ---- HUD ----
const $fps = document.getElementById('fps'),
      $res = document.getElementById('res'),
      $ms  = document.getElementById('ms');
let hudAt = 0, frames = 0, fpsT0 = performance.now();

// ---- main loop ----
let t = 0, prev = performance.now();
function frame(now){
  const dt = Math.min((now - prev) / 1000, 0.05); prev = now;
  t += dt;
  if (now - lastTouch > 4000) az += dt * 0.10;   // auto orbit when idle

  const [w, h] = LV[lvl];
  const t0 = performance.now();
  if (sceneMode === 'mesh' && meshModel && boneView) {
    boneView.set(GLB.sampleBones(meshModel, meshAnim, t));
    e.renderMesh(az, el, dist, w, h);
  } else {
    e.render(t, az, el, dist, w, h);
  }
  const rms = performance.now() - t0;
  ema = ema * 0.85 + rms * 0.15;

  if (now - lastSwitch > 800) {
    if (ema > 15 && lvl > 0)            { lvl--; lastSwitch = now; }
    else if (ema < 7.5 && lvl < LV.length - 1) { lvl++; lastSwitch = now; }
  }

  if (off.width !== w) { off.width = w; off.height = h; }
  octx.putImageData(imgs[lvl], 0, 0);
  ctx.imageSmoothingEnabled = false;
  // cover-fit
  const s = Math.max(cv.width / w, cv.height / h);
  const dw = w * s, dh = h * s;
  ctx.drawImage(off, (cv.width - dw) / 2, (cv.height - dh) / 2, dw, dh);

  frames++;
  if (now - hudAt > 500) {
    $fps.textContent = Math.round(frames * 1000 / (now - fpsT0));
    frames = 0; fpsT0 = now; hudAt = now;
    $res.textContent = w + '×' + h;
    $ms.textContent = ema.toFixed(1);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
